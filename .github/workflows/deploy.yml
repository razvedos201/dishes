name: Deploy to GitHub Pages

on:
  # Автодеплой при push в main
  push:
    branches: [main]
  # Возможность запустить руками из вкладки Actions
  workflow_dispatch:

# Заранее опт-инимся на Node.js 24 для JS-actions. С 2026-06-02 GitHub форсит
# переход, после 2026-09-16 Node 20 удалят с раннеров — без этого флага будет
# warning, а потом и поломка.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Права, нужные actions/deploy-pages@v4
permissions:
  contents: read
  pages: write
  id-token: write

# Если в очереди уже стоит более новый деплой — старый отменяем,
# но текущий выкатывание не прерываем (cancel-in-progress: false).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # base-href должен совпадать с подпапкой репозитория на GitHub Pages:
        # https://razvedos201.github.io/dishes/  →  --base-href "/dishes/"
        run: flutter build web --release --base-href "/dishes/"

      - name: Disable Jekyll
        # пустой .nojekyll, чтобы GitHub Pages не съел файлы, начинающиеся с _
        run: touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
